<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STRATCOM | Seismic Monitor 2038</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse-red {
            0%, 100% { box-shadow: 0 0 15px rgba(220, 38, 38, 0.5); }
            50% { box-shadow: 0 0 30px rgba(220, 38, 38, 0.8); }
        }
        .nuclear-alert { animation: pulse-red 1.5s infinite; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 font-mono min-h-screen">
    <div class="fixed inset-0 pointer-events-none z-50 opacity-10" style="background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); background-size: 100% 2px, 3px 100%;"></div>

    <div class="p-6 max-w-7xl mx-auto">
        <header class="flex justify-between items-center border-b border-cyan-900/50 pb-6 mb-8">
            <div>
                <h1 class="text-4xl font-black tracking-tighter text-cyan-500 uppercase">Seismic <span class="text-white">Intell</span></h1>
                <p class="text-xs text-cyan-700 tracking-[0.3em]">NEUTRAL REGION COMMAND CENTER // SECURE LINE</p>
            </div>
            <div class="text-right">
                <div id="clock" class="text-xl font-bold">00:00:00 UTC</div>
                <div class="text-[10px] text-emerald-500">SYSTEM STATUS: OPERATIONAL</div>
            </div>
        </header>

        <div class="grid grid-cols-12 gap-6">
            
            <div class="col-span-12 lg:col-span-7 space-y-6">
                <div class="glass border border-slate-800 p-4 rounded-sm relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-1 h-full bg-cyan-500"></div>
                    <h2 class="text-sm font-bold mb-4 text-cyan-500 uppercase tracking-widest">Real-Time Signal Feed</h2>
                    <div id="alerts-container" class="space-y-3 h-[500px] overflow-y-auto pr-2 custom-scrollbar">
                        </div>
                </div>
            </div>

            <div class="col-span-12 lg:col-span-5 space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div class="glass border border-slate-800 p-4 rounded-sm">
                        <p class="text-[10px] text-slate-500 uppercase">Active Sensors</p>
                        <p id="sensor-count" class="text-2xl font-bold text-white">0</p>
                    </div>
                    <div class="glass border border-slate-800 p-4 rounded-sm">
                        <p class="text-[10px] text-slate-500 uppercase">Threat Level</p>
                        <p id="threat-level" class="text-2xl font-bold text-emerald-400">LOW</p>
                    </div>
                </div>

                <div class="glass border border-slate-800 p-4 rounded-sm h-[400px]">
                    <h2 class="text-sm font-bold mb-4 text-slate-400 uppercase">Event Log</h2>
                    <div class="overflow-y-auto h-[320px] text-[11px]">
                        <table class="w-full">
                            <thead class="sticky top-0 bg-slate-900 text-slate-500 uppercase">
                                <tr>
                                    <th class="pb-2 text-left">Time</th>
                                    <th class="pb-2 text-left">Sensor</th>
                                    <th class="pb-2 text-right">Type</th>
                                </tr>
                            </thead>
                            <tbody id="history-table" class="divide-y divide-slate-800/50">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

<script src="app.js"></script> 
</body>
</html>
